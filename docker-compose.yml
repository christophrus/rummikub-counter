services:
  backend:
    build: ./backend
    container_name: rummikub-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - easyocr-models:/root/.EasyOCR
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: rummikub-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  easyocr-models:
    driver: local
